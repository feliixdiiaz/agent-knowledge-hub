name: ci
on:
  push:
    branches: [master]
  pull_request:
jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # Phase 1: no fzf on the runner yet. Everything here must produce the
      # same result on any machine, with or without fzf installed.
      - name: doctor on a clean checkout
        run: HUB_ROOT="$GITHUB_WORKSPACE" scripts/checks/doctor.sh
      - name: deterministic check suite
        run: bash scripts/checks/test-hooks.sh
      - name: lint the example hub
        run: scripts/checks/hub-lint.sh hubs/example
      - name: load-context tests
        run: cd skills/load-context && node --test
      - name: store-to-hub tests
        run: cd skills/store-to-hub && node --test
      - name: retrieval eval (deterministic core)
        run: cd skills/load-context && HUB_ROOT="$GITHUB_WORKSPACE" node evals/run.mjs
      - name: dedup eval (fzf absent)
        run: cd skills/store-to-hub && STORE_TO_HUB_ROOT="$GITHUB_WORKSPACE/hubs" node evals/run.mjs
      # Phase 2: install fzf and run the fuzzy paths explicitly. The dedup
      # eval reruns to prove its result is identical with fzf present.
      - name: install fzf
        run: sudo apt-get update -qq && sudo apt-get install -y -qq fzf
      - name: load-context tests (fuzzy suite)
        run: cd skills/load-context && WITH_FZF=1 node --test
      - name: retrieval eval (fuzzy cases)
        run: cd skills/load-context && HUB_ROOT="$GITHUB_WORKSPACE" node evals/run.mjs --fzf
      - name: dedup eval (fzf present, must match phase 1)
        run: cd skills/store-to-hub && STORE_TO_HUB_ROOT="$GITHUB_WORKSPACE/hubs" node evals/run.mjs
